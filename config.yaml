# config.yaml - Database Connections

instances:
  - name: "SQL-Prod-01"
    type: "sqlserver"
    host: "10.0.1.10"
    port: 1433
   # User and password will be read from environment variables
   # DB_SQL_PROD_01_USER and DB_SQL_PROD_01_PASSWORD

  - name: "SQL-Prod-02"
    type: "sqlserver"
    host: "10.0.1.11"
    port: 1433
    # User and password will be read from environment variables
    # DB_SQL_PROD_01_USER and DB_SQL_PROD_01_PASSWORD

  - name: "SQL-local"
    type: "sqlserver"
    host: "10.0.1.21"
    port: 1433
    # User and password will be read from environment variables
    # DB_SQL_LOCAL_USER and DB_SQL_LOCAL_PASSWORD

  - name: "PG-Cluster-01"
    type: "postgres"
    host: "10.0.5.21"
    port: 30432
    ha_provider: "cnpg"
    # Optional (local-only): disk paths on the monitoring server for statfs-based free-space checks.
    # pg_disk_paths:
    #   data: "/var/lib/postgresql/data"
    #   wal:  "/var/lib/postgresql/wal"
    # Optional: PgBouncer admin DSN (for pooler monitoring).
    # If set, the enterprise collector will query PgBouncer via `SHOW POOLS` and store totals in Timescale.
    # pgbouncer_admin_dsn: "postgres://pgbouncer_user:pgbouncer_pass@10.0.5.21:6432/pgbouncer?sslmode=disable"
    # User and password will be read from environment variables
    # DB_PG_CLUSTER_01_USER and DB_PG_CLUSTER_01_PASSWORD
