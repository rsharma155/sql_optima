# Full-stack profile: API + Timescale + Redis (Asynq) + Prometheus + Grafana.
# Optional Keycloak: uncomment service and set OIDC_* on the API.
#
# docker compose -f docker-compose.platform.yml up -d

services:
  api:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      PORT: ":8080"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set to a random string of at least 32 characters}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-1}
      DISABLE_PUBLIC_SETUP: ${DISABLE_PUBLIC_SETUP:-1}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-dbmonitor}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-dbmonitor_metrics}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-dbmonitor}
      DB_PASSWORD: ${DB_PASSWORD:-change_me}
      DB_NAME: ${DB_NAME:-dbmonitor_metrics}
    depends_on:
      - redis
      - timescaledb

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-dbmonitor}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: ${DB_NAME:-dbmonitor_metrics}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - tsdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=5000
      - -c
      - log_min_error_statement=error
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dbmonitor} -d ${DB_NAME:-dbmonitor_metrics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROM_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus

volumes:
  tsdata: {}
