#collector_name: mssql_comprehensive_monitoring
collector_name: mssql_standard
metrics:
  - metric_name: mssql_server_properties
    type: gauge
    help: SQL Server instance properties and uptime
    value_label: sql_instance_uptime 
    key_labels:
      - server_name
      - version
      - edition
      - product_level
    values:
      - uptime_seconds
    query: |
      SELECT 
        CAST(SERVERPROPERTY('ServerName') AS NVARCHAR(128)) as server_name,
        CAST(SERVERPROPERTY('ProductVersion') AS NVARCHAR(128)) as version,
        CAST(SERVERPROPERTY('Edition') AS NVARCHAR(128)) as edition,
        CAST(SERVERPROPERTY('ProductLevel') AS NVARCHAR(128)) as product_level,
        DATEDIFF(SECOND, sqlserver_start_time, GETDATE()) as uptime_seconds
      FROM sys.dm_os_sys_info
  - metric_name: mssql_cpu_usage_percent
    type: gauge
    help: CPU usage percentage by type
    value_label: cpu_usage_percent    
    key_labels:
      - cpu_type
    values:
      - usage_percent
      - timestamp
    query: |
      SELECT TOP 1
        'sql_process' as cpu_type,
        SQLProcessUtilization as usage_percent,
        [timestamp]
      FROM (
        SELECT 
          record.value('(./Record/SchedulerMonitorEvent/SystemHealth/ProcessUtilization)[1]', 'int') AS SQLProcessUtilization,
          [timestamp]
        FROM (
          SELECT [timestamp], CONVERT(xml, record) AS record
          FROM sys.dm_os_ring_buffers
          WHERE ring_buffer_type = N'RING_BUFFER_SCHEDULER_MONITOR'
          AND record LIKE N'%<SystemHealth>%'
        ) AS x
      ) AS y
      UNION ALL
      SELECT TOP 1
        'system_idle' as cpu_type,
        SystemIdle as usage_percent,
        [timestamp]
      FROM (
        SELECT 
          record.value('(./Record/SchedulerMonitorEvent/SystemHealth/SystemIdle)[1]', 'int') AS SystemIdle,
          [timestamp]
        FROM (
          SELECT [timestamp], CONVERT(xml, record) AS record
          FROM sys.dm_os_ring_buffers
          WHERE ring_buffer_type = N'RING_BUFFER_SCHEDULER_MONITOR'
          AND record LIKE N'%<SystemHealth>%'
        ) AS x
      ) AS y
      UNION ALL
      SELECT TOP 1
        'other_process' as cpu_type,
        100 - SystemIdle - SQLProcessUtilization as usage_percent,
        [timestamp]
      FROM (
        SELECT 
          record.value('(./Record/SchedulerMonitorEvent/SystemHealth/SystemIdle)[1]', 'int') AS SystemIdle,
          record.value('(./Record/SchedulerMonitorEvent/SystemHealth/ProcessUtilization)[1]', 'int') AS SQLProcessUtilization,
          [timestamp]
        FROM (
          SELECT [timestamp], CONVERT(xml, record) AS record
          FROM sys.dm_os_ring_buffers
          WHERE ring_buffer_type = N'RING_BUFFER_SCHEDULER_MONITOR'
          AND record LIKE N'%<SystemHealth>%'
        ) AS x
      ) AS y
      ORDER BY [timestamp] DESC
  - metric_name: mssql_scheduler_count
    type: gauge
    help: Number of schedulers
    value_label: mssql_scheduler_count    
    values:
      - online_schedulers
      - total_schedulers
    query: |
      SELECT 
        COUNT(*) as online_schedulers,
        (SELECT cpu_count FROM sys.dm_os_sys_info) as total_schedulers
      FROM sys.dm_os_schedulers
      WHERE status = 'VISIBLE ONLINE'
  - metric_name: mssql_memory_utilization_mb
    type: gauge
    help: Memory usage in MB by type
    value_label: mssql_memory_utilization_mb
    key_labels:
      - memory_type
    values:
      - size_mb
    query: |
      SELECT 
        'total_server_memory' as memory_type,
        cntr_value / 1024.0 as size_mb
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Memory Manager%'
      AND counter_name = 'Total Server Memory (KB)'
      UNION ALL
      SELECT 
        'target_server_memory' as memory_type,
        cntr_value / 1024.0 as size_mb
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Memory Manager%'
      AND counter_name = 'Target Server Memory (KB)'
      UNION ALL
      SELECT 
        'connection_memory' as memory_type,
        cntr_value / 1024.0 as size_mb
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Memory Manager%'
      AND counter_name = 'Connection Memory (KB)'
      UNION ALL
      SELECT 
        'lock_memory' as memory_type,
        cntr_value / 1024.0 as size_mb
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Memory Manager%'
      AND counter_name = 'Lock Memory (KB)'
  - metric_name: mssql_system_memory_mb
    type: gauge
    help: System memory statistics in MB
    value_label: System_memory
    values:
      - total_physical_memory_mb
      - available_physical_memory_mb
      - total_page_file_mb
      - available_page_file_mb
      - memory_utilization_percent
    query: |
      SELECT 
        total_physical_memory_kb / 1024.0 as total_physical_memory_mb,
        available_physical_memory_kb / 1024.0 as available_physical_memory_mb,
        total_page_file_kb / 1024.0 as total_page_file_mb,
        available_page_file_kb / 1024.0 as available_page_file_mb,
        100.0 - (CAST(available_physical_memory_kb AS FLOAT) / CAST(total_physical_memory_kb AS FLOAT) * 100.0) as memory_utilization_percent
      FROM sys.dm_os_sys_memory
  - metric_name: mssql_page_life_expectancy_seconds
    type: gauge
    help: Page Life Expectancy in seconds
    value_label: PLE
    values:
      - ple_seconds
    query: |
      SELECT CAST(cntr_value AS BIGINT) as ple_seconds
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Buffer Manager%'
      AND counter_name = 'Page life expectancy'
  - metric_name: mssql_buffer_cache_hit_ratio
    type: gauge
    help: Buffer cache hit ratio percentage
    value_label: Buffer_cache_hit_ratio
    values:
      - ratio_percent
    query: |
      SELECT 
        (CAST(a.cntr_value AS FLOAT) / CAST(NULLIF(b.cntr_value, 0) AS FLOAT)) * 100.0 as ratio_percent
      FROM sys.dm_os_performance_counters a
      JOIN (
        SELECT cntr_value, object_name
        FROM sys.dm_os_performance_counters  
        WHERE counter_name = 'Buffer cache hit ratio base'
        AND object_name LIKE '%Buffer Manager%'
      ) b ON a.object_name = b.object_name
      WHERE a.counter_name = 'Buffer cache hit ratio'
      AND a.object_name LIKE '%Buffer Manager%'
  - metric_name: mssql_memory_grants_pending
    type: gauge
    help: Number of processes waiting for memory grants
    value_label: No_of_process_waiting_memory_grants
    values:
      - pending_count
    query: |
      SELECT CAST(cntr_value AS INT) as pending_count
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Memory Manager%'
      AND counter_name = 'Memory Grants Pending'
  - metric_name: mssql_lazy_writes_per_sec
    type: gauge
    help: Lazy writes per second
    value_label: Lazy_writes
    values:
      - lazy_writes
    query: |
      SELECT CAST(cntr_value AS BIGINT) as lazy_writes
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Buffer Manager%'
      AND counter_name = 'Lazy writes/sec'
  - metric_name: mssql_wait_stats
    type: counter
    help: Wait statistics by wait type
    value_label: Wait_Stats_by_type
    key_labels:
      - wait_type
    values:
      - wait_time_ms
      - waiting_tasks_count
      - signal_wait_time_ms
      - resource_wait_time_ms
    query: |
      SELECT TOP 30
        wait_type,
        wait_time_ms,
        waiting_tasks_count,
        signal_wait_time_ms,
        wait_time_ms - signal_wait_time_ms as resource_wait_time_ms
      FROM sys.dm_os_wait_stats
      WHERE wait_type NOT IN (
        'BROKER_EVENTHANDLER', 'BROKER_RECEIVE_WAITFOR', 'BROKER_TASK_STOP',
        'BROKER_TO_FLUSH', 'CHECKPOINT_QUEUE', 'CHKPT', 'CLR_AUTO_EVENT',
        'CLR_MANUAL_EVENT', 'LAZYWRITER_SLEEP', 'LOGMGR_QUEUE',
        'ONDEMAND_TASK_QUEUE', 'REQUEST_FOR_DEADLOCK_SEARCH',
        'SLEEP_BPOOL_FLUSH', 'SLEEP_DBSTARTUP', 'SLEEP_TASK',
        'SQLTRACE_BUFFER_FLUSH', 'WAITFOR', 'XE_DISPATCHER_WAIT', 
        'XE_TIMER_EVENT', 'SLEEP_SYSTEMTASK', 'HADR_FILESTREAM_IOMGR_IOCOMPLETION'
      )
      AND wait_time_ms > 0
      ORDER BY wait_time_ms DESC
  - metric_name: mssql_batch_requests_per_sec
    type: gauge
    help: Batch requests per second
    value_label: Batch_request_sec
    values:
      - requests_per_sec
    query: |
      SELECT CAST(cntr_value AS BIGINT) as requests_per_sec
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%SQL Statistics%'
      AND counter_name = 'Batch Requests/sec'
  - metric_name: mssql_sql_compilations_per_sec
    type: gauge
    help: SQL compilations per second
    value_label: SQL_Compile_Sec
    values:
      - compilations_per_sec
    query: |
      SELECT CAST(cntr_value AS BIGINT) as compilations_per_sec
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%SQL Statistics%'
      AND counter_name = 'SQL Compilations/sec'
  - metric_name: mssql_sql_recompilations_per_sec
    type: gauge
    help: SQL re-compilations per second
    value_label: SQL_Recompile
    values:
      - recompilations_per_sec
    query: |
      SELECT CAST(cntr_value AS BIGINT) as recompilations_per_sec
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%SQL Statistics%'
      AND counter_name = 'SQL Re-Compilations/sec'
  - metric_name: mssql_user_connections
    type: gauge
    help: Number of user connections
    values:
      - connection_count
    query: |
      SELECT CAST(cntr_value AS INT) as connection_count
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%General Statistics%'
      AND counter_name = 'User Connections'
  - metric_name: mssql_blocking_sessions
    type: gauge
    help: Currently blocking sessions
    value_label: Blocking_sessions
    key_labels:
      - wait_type
    values:
      - blocked_session_count
      - total_wait_time_sec
      - blocking_session_id
    query: |
      SELECT 
        ISNULL(wait_type, 'UNKNOWN') as wait_type,
        COUNT(*) as blocked_session_count,
        SUM(wait_time) / 1000.0 as total_wait_time_sec,
        blocking_session_id
      FROM sys.dm_exec_requests
      WHERE blocking_session_id <> 0
      GROUP BY blocking_session_id, wait_type
  - metric_name: mssql_active_sessions_by_status
    type: gauge
    help: Active user sessions by status
    value_label: Active_sessions
    key_labels:
      - status
      - login_name
      - program_name
    values:
      - session_count
    query: |
      SELECT 
        status,
        login_name,
        program_name,
        COUNT(*) as session_count
      FROM sys.dm_exec_sessions
      WHERE is_user_process = 1
      GROUP BY status, login_name, program_name
  - metric_name: mssql_active_requests
    type: gauge
    help: Currently active requests
    value_label: Active_requests
    values:
      - request_count
      - total_cpu_time_ms
      - total_elapsed_time_ms
    query: |
      SELECT 
        COUNT(*) as request_count,
        SUM(cpu_time) as total_cpu_time_ms,
        SUM(total_elapsed_time) as total_elapsed_time_ms
      FROM sys.dm_exec_requests
      WHERE session_id <> @@SPID
  - metric_name: mssql_lock_statistics
    type: counter
    help: Lock statistics
    value_label: Lock_stats
    key_labels:
      - counter_name
    values:
      - counter_value
    query: |
      SELECT 
        counter_name,
        CAST(cntr_value AS BIGINT) as counter_value
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Locks%'
      AND instance_name = '_Total'
      AND counter_name IN (
        'Number of Deadlocks/sec',
        'Lock Waits/sec',
        'Lock Wait Time (ms)',
        'Lock Timeouts/sec',
        'Lock Requests/sec',
        'Average Wait Time (ms)'
      )
  - metric_name: mssql_deadlock_count
    type: counter
    help: Total deadlock count
    value_label: Deadlock_Count
    values:
      - deadlock_count
    query: |
      SELECT CAST(cntr_value AS BIGINT) as deadlock_count
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Locks%'
      AND counter_name = 'Number of Deadlocks/sec'
      AND instance_name = '_Total'
  - metric_name: mssql_database_size_mb
    type: gauge
    help: Database file sizes in MB
    value_label: DB_file_Size
    key_labels:
      - database_name
      - file_type
      - file_name
    values:
      - size_mb
      - max_size_mb
      - growth_mb
    query: |
      SELECT 
        DB_NAME(database_id) as database_name,
        CASE type 
          WHEN 0 THEN 'DATA'
          WHEN 1 THEN 'LOG'
          ELSE 'OTHER'
        END as file_type,
        name as file_name,
        size * 8.0 / 1024.0 as size_mb,
        CASE max_size 
          WHEN -1 THEN -1
          WHEN 268435456 THEN -1
          ELSE max_size * 8.0 / 1024.0
        END as max_size_mb,
        CASE is_percent_growth
          WHEN 1 THEN growth
          ELSE growth * 8.0 / 1024.0
        END as growth_mb
      FROM sys.master_files
      WHERE database_id > 4
  - metric_name: mssql_database_space_usage
    type: gauge
    help: Database space usage statistics
    value_label: DB_Space_Usage
    key_labels:
      - database_name
    values:
      - data_size_mb
      - log_size_mb
      - log_used_mb
      - log_used_percent
    query: |
     SELECT 
         d.name AS database_name,
         SUM(CASE WHEN f.type = 0 THEN f.size END) * 8.0 / 1024.0 AS data_size_mb,
         SUM(CASE WHEN f.type = 1 THEN f.size END) * 8.0 / 1024.0 AS log_size_mb,
         SUM(CASE WHEN f.type = 1 THEN ISNULL(FILEPROPERTY(f.name, 'SpaceUsed'), 0) END) * 8.0 / 1024.0 AS log_used_mb,
         ISNULL(
             CAST(NULLIF(SUM(CASE WHEN f.type = 1 THEN ISNULL(FILEPROPERTY(f.name, 'SpaceUsed'), 0) END), 0) AS FLOAT) / 
             NULLIF(SUM(CASE WHEN f.type = 1 THEN f.size END), 0) * 100.0, 
             0.0
         ) AS log_used_percent
     FROM sys.databases d
     INNER JOIN sys.master_files f ON d.database_id = f.database_id
     WHERE d.database_id > 4
     GROUP BY d.name
  - metric_name: mssql_database_io_stats
    type: counter
    help: Database I/O statistics
    value_label: DB_IO_stats
    key_labels:
      - database_name
      - file_type
    values:
      - num_of_reads
      - num_of_writes
      - num_of_bytes_read
      - num_of_bytes_written
      - io_stall_read_ms
      - io_stall_write_ms
    query: |
      SELECT 
        DB_NAME(database_id) as database_name,
        CASE 
          WHEN file_id = 1 THEN 'DATA'
          WHEN file_id = 2 THEN 'LOG'
          ELSE 'OTHER'
        END as file_type,
        SUM(num_of_reads) as num_of_reads,
        SUM(num_of_writes) as num_of_writes,
        SUM(num_of_bytes_read) as num_of_bytes_read,
        SUM(num_of_bytes_written) as num_of_bytes_written,
        SUM(io_stall_read_ms) as io_stall_read_ms,
        SUM(io_stall_write_ms) as io_stall_write_ms
      FROM sys.dm_io_virtual_file_stats(NULL, NULL)
      WHERE database_id > 4
      GROUP BY database_id, 
        CASE 
          WHEN file_id = 1 THEN 'DATA'
          WHEN file_id = 2 THEN 'LOG'
          ELSE 'OTHER'
        END
  - metric_name: mssql_transactions_per_sec
    type: gauge
    help: Transactions per second by database
    value_label: Transaction_per_sec_db 
    key_labels:
      - database_name
    values:
      - transactions_per_sec
    query: |
      SELECT 
        instance_name as database_name,
        CAST(cntr_value AS BIGINT) as transactions_per_sec
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Databases%'
      AND counter_name = 'Transactions/sec'
      AND instance_name <> '_Total'
  - metric_name: mssql_active_transactions
    type: gauge
    help: Currently active transactions
    value_label: active_tran 
    key_labels:
      - transaction_state
    values:
      - transaction_count
    query: |
      SELECT 
        CASE transaction_state
          WHEN 0 THEN 'Initializing'
          WHEN 1 THEN 'Initialized'
          WHEN 2 THEN 'Active'
          WHEN 3 THEN 'Ended'
          WHEN 4 THEN 'Commit_Started'
          WHEN 5 THEN 'Prepared'
          WHEN 6 THEN 'Committed'
          WHEN 7 THEN 'Rolling_Back'
          WHEN 8 THEN 'Rolled_Back'
          ELSE 'Unknown'
        END as transaction_state,
        COUNT(*) as transaction_count
      FROM sys.dm_tran_active_transactions
      GROUP BY transaction_state
  - metric_name: mssql_log_growths
    type: counter
    help: Transaction log auto-growths
    value_label: trn_log_auto_growth
    key_labels:
      - database_name
    values:
      - log_growth_count
    query: |
      SELECT 
        instance_name as database_name,
        CAST(cntr_value AS BIGINT) as log_growth_count
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Databases%'
      AND counter_name = 'Log Growths'
      AND instance_name <> '_Total'
  - metric_name: mssql_log_shrinks
    type: counter
    help: Transaction log shrinks
    value_label: trn_log_shrinks
    key_labels:
      - database_name
    values:
      - log_shrink_count
    query: |
      SELECT 
        instance_name as database_name,
        CAST(cntr_value AS BIGINT) as log_shrink_count
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Databases%'
      AND counter_name = 'Log Shrinks'
      AND instance_name <> '_Total'
  - metric_name: mssql_long_running_queries
    type: gauge
    help: Queries running longer than 30 seconds
    value_label: Long_running_queries
    key_labels:
      - session_id
      - login_name
      - program_name
      - database_name
      - query_text
    values:
      - elapsed_time_sec
      - cpu_time_sec
      - wait_time_sec
    query: |
      SELECT 
        CAST(r.session_id AS VARCHAR(10)) as session_id,
        ISNULL(s.login_name, 'System') as login_name,
        ISNULL(s.program_name, 'System') as program_name,
        ISNULL(DB_NAME(r.database_id), 'System') as database_name,
        ISNULL(SUBSTRING(t.text, 1, 255), 'Unknown') as query_text,
        ISNULL(r.total_elapsed_time / 1000.0, 0) as elapsed_time_sec,
        ISNULL(r.cpu_time / 1000.0, 0) as cpu_time_sec,
        ISNULL(r.wait_time / 1000.0, 0) as wait_time_sec
      FROM sys.dm_exec_requests r
      LEFT JOIN sys.dm_exec_sessions s ON r.session_id = s.session_id
      CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t
      WHERE r.total_elapsed_time > 30000
      AND r.session_id <> @@SPID
  - metric_name: mssql_agent_job_status
    type: gauge
    help: SQL Agent job last run status
    value_label: SQL_Agent_Jobs
    key_labels:
      - job_name
      - job_enabled
    values:
      - last_run_outcome
      - last_run_duration_sec
      - next_run_hours
    query: |
      SELECT TOP 100
        j.name as job_name,
        CASE j.enabled WHEN 1 THEN 'enabled' ELSE 'disabled' END as job_enabled,
        CASE ISNULL(h.run_status, -1)
          WHEN 0 THEN -1
          WHEN 1 THEN 1
          WHEN 2 THEN 0
          WHEN 3 THEN 0
          WHEN 4 THEN 0
          ELSE 0
        END as last_run_outcome,
        ISNULL((h.run_duration / 10000 * 3600) + 
          ((h.run_duration % 10000) / 100 * 60) + 
          (h.run_duration % 100), 0) as last_run_duration_sec,
        ISNULL(DATEDIFF(HOUR, GETDATE(),
            TRY_CONVERT(
            DATETIME, CAST(js.next_run_date AS VARCHAR(8)) + ' ' + 
            RIGHT('0000' + CAST(js.next_run_time AS VARCHAR(4)), 4)
            )
        ), 0) as next_run_hours
      FROM msdb.dbo.sysjobs j
      LEFT JOIN msdb.dbo.sysjobschedules js ON j.job_id = js.job_id
      LEFT JOIN (
        SELECT job_id, run_status, run_duration,
          ROW_NUMBER() OVER (PARTITION BY job_id ORDER BY run_date DESC, run_time DESC) as rn
        FROM msdb.dbo.sysjobhistory
        WHERE step_id = 0
      ) h ON j.job_id = h.job_id AND h.rn = 1
  - metric_name: mssql_failed_jobs_recent
    type: gauge
    help: Jobs that failed in the last hour
    value_label: Job_Failure
    values:
      - failed_job_count
    query: |
      SELECT ISNULL(COUNT(DISTINCT j.job_id), 0) as failed_job_count
      FROM msdb.dbo.sysjobs j
      INNER JOIN msdb.dbo.sysjobhistory h ON j.job_id = h.job_id
      WHERE h.run_status = 0
      AND h.step_id = 0
      AND CONVERT(DATETIME, 
          CAST(h.run_date AS CHAR(8)) + ' ' + 
          STUFF(STUFF(RIGHT('000000' + CAST(h.run_time AS VARCHAR(6)), 6), 5, 0, ':'), 3, 0, ':'),
          120) > DATEADD(HOUR, -1, GETDATE())
  - metric_name: mssql_agent_running_jobs
    type: gauge
    help: Currently running SQL Agent jobs
    value_label: Running_jobs
    values:
      - running_job_count
    query: |
      SELECT ISNULL(COUNT(*), 0) as running_job_count
      FROM msdb.dbo.sysjobs_view j
      INNER JOIN msdb.dbo.sysjobactivity ja ON j.job_id = ja.job_id
      WHERE ja.run_requested_date IS NOT NULL
      AND ja.stop_execution_date IS NULL
  - metric_name: mssql_availability_group_state
    type: gauge
    help: Always On AG synchronization state
    value_label: AG_sync_state
    key_labels:
      - ag_name
      - replica_server
      - database_name
    values:
      - synchronization_health
      - is_primary_replica
      - is_local
      - synchronization_state
    query: |
      SELECT 
        ag.name as ag_name,
        ar.replica_server_name as replica_server,
        db.database_name,
        drs.synchronization_health,
        CASE WHEN ar.replica_server_name = @@SERVERNAME 
             AND ags.primary_replica = @@SERVERNAME THEN 1 ELSE 0 END as is_primary_replica,
        CASE WHEN drs.is_local = 1 THEN 1 ELSE 0 END as is_local,
        drs.synchronization_state
      FROM sys.dm_hadr_database_replica_states drs
      INNER JOIN sys.availability_replicas ar ON drs.replica_id = ar.replica_id
      INNER JOIN sys.availability_groups ag ON ar.group_id = ag.group_id
      INNER JOIN sys.dm_hadr_availability_group_states ags ON ag.group_id = ags.group_id
      INNER JOIN sys.availability_databases_cluster db ON drs.group_database_id = db.group_database_id
  - metric_name: mssql_ag_replication_lag
    type: gauge
    help: Replication lag in seconds for secondary replicas
    value_label: Replication_lag
    key_labels:
      - ag_name
      - replica_server
      - database_name
    values:
      - lag_seconds
      - redo_queue_size_kb
      - log_send_queue_size_kb
      - redo_rate_kb_per_sec
    query: |
      SELECT 
        ag.name as ag_name,
        ar.replica_server_name as replica_server,
        db.database_name,
        ISNULL(DATEDIFF(SECOND, drs.last_commit_time, GETDATE()), 0) as lag_seconds,
        ISNULL(drs.redo_queue_size, 0) as redo_queue_size_kb,
        ISNULL(drs.log_send_queue_size, 0) as log_send_queue_size_kb,
        ISNULL(drs.redo_rate, 0) as redo_rate_kb_per_sec
      FROM sys.dm_hadr_database_replica_states drs
      INNER JOIN sys.availability_replicas ar ON drs.replica_id = ar.replica_id
      INNER JOIN sys.availability_groups ag ON ar.group_id = ag.group_id
      INNER JOIN sys.availability_databases_cluster db ON drs.group_database_id = db.group_database_id
      WHERE drs.is_local = 0
  - metric_name: mssql_ag_replica_role
    type: gauge
    help: Availability Group replica role
    value_label: AG_Replica_role
    key_labels:
      - ag_name
      - replica_server
    values:
      - is_primary
      - connected_state
      - role
    query: |
      SELECT 
        ag.name as ag_name,
        ar.replica_server_name as replica_server,
        CASE WHEN ars.role = 1 THEN 1 ELSE 0 END as is_primary,
        ars.connected_state,
        ars.role
      FROM sys.dm_hadr_availability_replica_states ars
      INNER JOIN sys.availability_replicas ar ON ars.replica_id = ar.replica_id
      INNER JOIN sys.availability_groups ag ON ar.group_id = ag.group_id
  - metric_name: mssql_disk_space_mb
    type: gauge
    help: Disk space for database files
    value_label: Disk_Space_dbfiles
    key_labels:
      - drive_letter
    values:
      - total_size_mb
      - available_space_mb
      - used_percent
    query: |
      SELECT 
        vs.volume_mount_point as drive_letter,
        MAX(vs.total_bytes / 1024.0 / 1024.0) as total_size_mb,
        MAX(vs.available_bytes / 1024.0 / 1024.0) as available_space_mb,
        MAX((1 - (CAST(vs.available_bytes AS FLOAT) / CAST(vs.total_bytes AS FLOAT))) * 100.0) as used_percent
      FROM sys.master_files mf
      CROSS APPLY sys.dm_os_volume_stats(mf.database_id, mf.file_id) vs
      GROUP BY vs.volume_mount_point
  - metric_name: mssql_tempdb_usage_mb
    type: gauge
    help: TempDB space usage
    value_label: Tempdb_usage
    key_labels:
      - file_type
    values:
      - size_mb
      - used_mb
      - free_mb
      - used_percent
    query: |
     SELECT 
         CASE type 
             WHEN 0 THEN 'DATA'
             WHEN 1 THEN 'LOG'
             ELSE 'OTHER'
         END AS file_type,
         SUM(size * 8.0 / 1024.0) AS size_mb,
         SUM(ISNULL(FILEPROPERTY(name, 'SpaceUsed'), 0) * 8.0 / 1024.0) AS used_mb,
         SUM((size - ISNULL(FILEPROPERTY(name, 'SpaceUsed'), 0)) * 8.0 / 1024.0) AS free_mb,
         (SUM(CAST(ISNULL(FILEPROPERTY(name, 'SpaceUsed'), 0) AS FLOAT)) / 
             NULLIF(SUM(CAST(size AS FLOAT)), 0)) * 100.0 AS used_percent
     FROM tempdb.sys.database_files
     GROUP BY type;
  - metric_name: mssql_connections_by_database
    type: gauge
    help: Current connections by database
    value_label: Curr_connections
    key_labels:
      - database_name
    values:
      - connection_count
    query: |
      SELECT 
        ISNULL(DB_NAME(database_id), 'SYSTEM') as database_name,
        COUNT(*) as connection_count
      FROM sys.dm_exec_sessions
      WHERE is_user_process = 1
      GROUP BY database_id
  - metric_name: mssql_plan_cache_mb
    type: gauge
    help: Plan cache statistics
    value_label: Plan_cache_stat
    key_labels:
      - cache_type
    values:
      - size_mb
      - entry_count
    query: |
      SELECT 
        objtype as cache_type,
        SUM(CAST(size_in_bytes AS BIGINT)) / 1024.0 / 1024.0 as size_mb,
        COUNT(*) as entry_count
      FROM sys.dm_exec_cached_plans
      GROUP BY objtype
  - metric_name: mssql_plan_cache_hit_ratio
    type: gauge
    help: Plan cache hit ratio
    value_label: Plan_cache_ratio
    values:
      - hit_ratio_percent
    query: |
      SELECT 
        CASE WHEN SUM(CASE counter_name WHEN 'Cache Hit Ratio Base' THEN cntr_value END) > 0
          THEN (CAST(SUM(CASE counter_name WHEN 'Cache Hit Ratio' THEN cntr_value END) AS FLOAT) / 
                CAST(SUM(CASE counter_name WHEN 'Cache Hit Ratio Base' THEN cntr_value END) AS FLOAT)) * 100.0
          ELSE 0
        END as hit_ratio_percent
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Plan Cache%'
      AND instance_name = '_Total'
      AND counter_name IN ('Cache Hit Ratio', 'Cache Hit Ratio Base')

  - metric_name: mssql_top_cpu_queries
    type: gauge
    help: Top CPU consuming queries (active)
    value_label: top_cpu_queries
    key_labels:
      - query_hash_cpu
      - query_text_cpu
      - database_name
      - program_name
      - login_name
    values:
      - total_worker_time_ms
      - execution_count_cpu
      - avg_worker_time_ms
      - total_elapsed_time_ms
    query: |
      SELECT TOP 20
        CONVERT(VARCHAR(50), r.query_hash, 2) as query_hash_cpu,
        SUBSTRING(t.text, (r.statement_start_offset/2)+1, 
          ((CASE r.statement_end_offset
            WHEN -1 THEN DATALENGTH(t.text)
            ELSE r.statement_end_offset
          END - r.statement_start_offset)/2) + 1) as query_text_cpu,
        ISNULL(DB_NAME(r.database_id), 'Ad-Hoc') as database_name,
        ISNULL(s.program_name, '') as program_name,
        ISNULL(s.login_name, '') as login_name,
        r.cpu_time as total_worker_time_ms,
        qs.execution_count as execution_count_cpu,
        qs.total_worker_time / qs.execution_count / 1000 as avg_worker_time_ms,
        r.total_elapsed_time as total_elapsed_time_ms
      FROM sys.dm_exec_requests r
      JOIN sys.dm_exec_sessions s ON r.session_id = s.session_id
      CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t
      LEFT JOIN sys.dm_exec_query_stats qs ON r.plan_handle = qs.plan_handle
      WHERE s.is_user_process = 1
      ORDER BY r.cpu_time DESC
      
  - metric_name: mssql_top_io_queries
    type: gauge
    help: Top I/O consuming queries (active)
    value_label: top_io_queries
    key_labels:
      - query_hash_io
      - query_text_io
      - database_name
      - program_name
      - login_name
    values:
      - total_logical_reads_mb
      - total_logical_writes_mb
      - total_physical_reads_mb
      - execution_count_io
    query: |
      SELECT TOP 20
        CONVERT(VARCHAR(50), r.query_hash, 2) AS query_hash_io,
        SUBSTRING(t.text, (r.statement_start_offset/2)+1, 
          ((CASE r.statement_end_offset
            WHEN -1 THEN DATALENGTH(t.text)
            ELSE r.statement_end_offset
          END - r.statement_start_offset)/2) + 1) AS query_text_io,
        ISNULL(DB_NAME(r.database_id), 'Ad-Hoc') as database_name,
        ISNULL(s.program_name, '') as program_name,
        ISNULL(s.login_name, '') as login_name,
        (r.logical_reads * 8.0) / 1024.0 AS total_logical_reads_mb,
        (r.writes * 8.0) / 1024.0 AS total_logical_writes_mb,
        (r.reads * 8.0) / 1024.0 AS total_physical_reads_mb,
        qs.execution_count AS execution_count_io
      FROM sys.dm_exec_requests r
      JOIN sys.dm_exec_sessions s ON r.session_id = s.session_id
      CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t
      LEFT JOIN sys.dm_exec_query_stats qs ON r.plan_handle = qs.plan_handle
      WHERE s.is_user_process = 1
      ORDER BY r.logical_reads DESC


  - metric_name: mssql_missing_indexes_impact
    type: gauge
    help: Potential improvement from missing indexes
    value_label: Missing_index_improvement
    values:
      - total_impact_score
      - missing_index_count
      - avg_user_impact
    query: |
      SELECT 
        ISNULL(SUM(migs.avg_total_user_cost * migs.avg_user_impact * (migs.user_seeks + migs.user_scans)), 0) as total_impact_score,
        ISNULL(COUNT(*), 0) as missing_index_count,
        ISNULL(AVG(migs.avg_user_impact), 0) as avg_user_impact
      FROM sys.dm_db_missing_index_group_stats migs
      INNER JOIN sys.dm_db_missing_index_groups mig ON migs.group_handle = mig.index_group_handle
  - metric_name: mssql_last_backup_hours
    type: gauge
    help: Hours since last backup
    value_label: backup_since_last
    key_labels:
      - database_name
      - backup_type
    values:
      - hours_since_backup
    query: |
      SELECT 
        d.name as database_name,
        CASE b.type
          WHEN 'D' THEN 'FULL'
          WHEN 'I' THEN 'DIFFERENTIAL'
          WHEN 'L' THEN 'LOG'
          ELSE 'OTHER'
        END as backup_type,
        ISNULL(DATEDIFF(HOUR, MAX(b.backup_finish_date), GETDATE()), 9999) as hours_since_backup
      FROM sys.databases d
      LEFT JOIN msdb.dbo.backupset b ON d.name = b.database_name
      WHERE d.database_id > 4
      GROUP BY d.name, b.type
  - metric_name: mssql_checkpoint_pages_per_sec
    type: gauge
    help: Checkpoint pages per second
    value_label: chekcpoint_sec
    values:
      - pages_per_sec
    query: |
      SELECT CAST(cntr_value AS BIGINT) as pages_per_sec
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Buffer Manager%'
      AND counter_name = 'Checkpoint pages/sec'
  - metric_name: mssql_readahead_pages_per_sec
    type: gauge
    help: Read-ahead pages per second
    values:
      - pages_per_sec
    query: |
      SELECT CAST(cntr_value AS BIGINT) as pages_per_sec
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Buffer Manager%'
      AND counter_name = 'Readahead pages/sec'
  - metric_name: mssql_log_flush_wait_time_ms
    type: gauge
    help: Log flush wait time in milliseconds
    value_label: log_flush_wait
    key_labels:
      - database_name
    values:
      - wait_time_ms
    query: |
      SELECT 
        instance_name as database_name,
        CAST(cntr_value AS BIGINT) as wait_time_ms
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%Databases%'
      AND counter_name = 'Log Flush Wait Time'
      AND instance_name <> '_Total'
  - metric_name: mssql_mirroring_state
    type: gauge
    help: Database mirroring state
    value_label: DB_Mirroring
    key_labels:
      - database_name
    values:
      - mirroring_state
      - mirroring_safety_level
    query: |
      SELECT
        DB_NAME(database_id) as database_name,
        mirroring_state,
        mirroring_safety_level
      FROM sys.database_mirroring
      WHERE mirroring_guid IS NOT NULL
#  - metric_name: mssql_resource_pool_stats
