  - metric_name: mssql_instance_info
    type: gauge
    help: SQL Server instance information
    value_label: SQL_Instance
    key_labels:
      - version
      - edition
      - collation
    values:
      - value
    query: |
      SELECT
        CAST(SERVERPROPERTY('ProductVersion') AS NVARCHAR(128)) as version,
        CAST(SERVERPROPERTY('Edition') AS NVARCHAR(128)) as edition,
        CAST(SERVERPROPERTY('Collation') AS NVARCHAR(128)) as collation,
      1 as value
  - metric_name: mssql_spinlock_waits
    type: counter
    help: Spinlock wait statistics
    value_label: spinlock
    key_labels:
      - spinlock_type
    values:
      - collisions
      - spins
      - sleep_time_ms
    query: |
      SELECT TOP 10
        name as spinlock_type,
        collisions,
        spins,
        sleep_time as sleep_time_ms
      FROM sys.dm_os_spinlock_stats
      WHERE collisions > 0
      ORDER BY collisions DESC
  - metric_name: mssql_tempdb_contention
    type: gauge
    help: TempDB allocation contention (PAGELATCH)
    value_label: tempdb_contention
    key_labels:
      - wait_type
    values:
      - waiting_tasks_count
      - wait_time_ms
    query: |
      SELECT 
        wait_type,
        waiting_tasks_count,
        wait_time_ms
      FROM sys.dm_os_wait_stats
      WHERE wait_type IN (
        'PAGELATCH_UP',
        'PAGELATCH_EX',
        'PAGELATCH_SH'
      )
  - metric_name: mssql_version_store_usage_mb
    type: gauge
    help: TempDB Version Store usage in MB
    value_label: version_store_mb
    values:
      - version_store_mb
    query: |
      SELECT 
        ISNULL((SUM(version_store_reserved_page_count) * 8.0) / 1024.0, 0) as version_store_mb
      FROM sys.dm_db_file_space_usage
  - metric_name: mssql_error_counters
    type: gauge
    help: SQL Server Error Counters
    value_label: error_counters
    key_labels:
      - counter_name
    values:
      - cntr_value
    query: |
      SELECT 
        counter_name,
        cntr_value
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%General Statistics%'
      AND counter_name IN ('Logins/sec', 'Logouts/sec', 'Connection Reset/sec', 'Processes blocked', 'User Connections')
      UNION ALL
      SELECT 
        counter_name,
        cntr_value
      FROM sys.dm_os_performance_counters
      WHERE object_name LIKE '%SQL Errors%'
      AND counter_name = 'Errors/sec'
      AND instance_name = '_Total'
  - metric_name: mssql_latch_waits
    type: counter
    help: Latch wait statistics (internal synchronization objects)
    value_label: latch_waits
    key_labels:
      - wait_type
    values:
      - waiting_tasks_count
      - wait_time_ms
      - signal_wait_time_ms
    query: |
      SELECT TOP 20
        wait_type,
        waiting_tasks_count,
        wait_time_ms,
        signal_wait_time_ms
      FROM sys.dm_os_latch_stats
      WHERE wait_time_ms > 0
      ORDER BY wait_time_ms DESC
  - metric_name: mssql_memory_clerks_detailed
    type: gauge
    help: Detailed memory clerk breakdown
    value_label: memory_clerks
    key_labels:
      - clerk_type
      - memory_node
    values:
      - pages_mb
      - virtual_memory_reserved_mb
      - virtual_memory_committed_mb
      - awe_memory_mb
    query: |
      SELECT TOP 50
        RTRIM(c.type) as clerk_type,
        ISNULL(a.memory_node_id, 0) as memory_node,
        ISNULL(SUM(a.pages_used), 0) / 1024.0 as pages_mb,
        ISNULL(SUM(a.virtual_memory_reserved_kb), 0) / 1024.0 as virtual_memory_reserved_mb,
        ISNULL(SUM(a.virtual_memory_committed_kb), 0) / 1024.0 as virtual_memory_committed_mb,
        ISNULL(SUM(a.awe_memory_used_kb), 0) / 1024.0 as awe_memory_mb
      FROM sys.dm_os_memory_clerks a
      GROUP BY a.type, a.memory_node_id
      HAVING SUM(a.pages_used) > 0
      ORDER BY pages_mb DESC
  - metric_name: mssql_waiting_tasks
    type: gauge
    help: Currently waiting tasks
    value_label: waiting_tasks
    key_labels:
      - wait_type
      - resource_address
    values:
      - waiting_tasks_count
      - wait_duration_ms
    query: |
      SELECT TOP 20
        wt.wait_type,
        wt.resource_description as resource_address,
        COUNT(*) as waiting_tasks_count,
        MAX(wt.wait_duration_ms) as wait_duration_ms
      FROM sys.dm_os_waiting_tasks wt
      GROUP BY wt.wait_type, wt.resource_description
      ORDER BY waiting_tasks_count DESC
  - metric_name: mssql_procedure_stats
    type: counter
    help: Stored procedure execution statistics
    value_label: proc_stats
    key_labels:
      - database_name
      - schema_name
      - object_name
    values:
      - execution_count
      - total_worker_time_ms
      - total_elapsed_time_ms
      - total_logical_reads
      - total_physical_reads
    query: |
      SELECT TOP 50
        ISNULL(DB_NAME(CAST(ISNULL(ep.value, 0) AS INT)), 'Unknown') as database_name,
        ISNULL(OBJECT_SCHEMA_NAME(ep.object_id, CAST(ISNULL(ep.value, 0) AS INT)), 'dbo') as schema_name,
        ISNULL(OBJECT_NAME(ep.object_id, CAST(ISNULL(ep.value, 0) AS INT)), 'Unknown') as object_name,
        SUM(ps.execution_count) as execution_count,
        SUM(ps.total_worker_time) / 1000.0 as total_worker_time_ms,
        SUM(ps.total_elapsed_time) / 1000.0 as total_elapsed_time_ms,
        SUM(ps.total_logical_reads) as total_logical_reads,
        SUM(ps.total_physical_reads) as total_physical_reads
      FROM sys.dm_exec_procedure_stats ps
      OUTER APPLY sys.dm_exec_plan_attributes(ps.plan_handle) ep
      WHERE ep.attribute = 'dbid'
      AND ps.execution_count > 0
      GROUP BY ep.value, ep.object_id
      ORDER BY total_worker_time_ms DESC
  - metric_name: mssql_database_size_growth
    type: gauge
    help: Database size for growth trending (daily collection)
    value_label: db_size_growth
    key_labels:
      - database_name
    values:
      - data_size_gb
      - log_size_gb
      - total_size_gb
      - space_used_gb
    query: |
      SELECT 
        d.name as database_name,
        ISNULL(SUM(CASE WHEN mf.type = 0 THEN mf.size * 8.0 / 1024.0 / 1024.0 ELSE 0 END), 0) as data_size_gb,
        ISNULL(SUM(CASE WHEN mf.type = 1 THEN mf.size * 8.0 / 1024.0 / 1024.0 ELSE 0 END), 0) as log_size_gb,
        ISNULL(SUM(mf.size * 8.0 / 1024.0 / 1024.0), 0) as total_size_gb,
        ISNULL(SUM(ISNULL(FILEPROPERTY(mf.name, 'SpaceUsed'), 0) * 8.0 / 1024.0 / 1024.0), 0) as space_used_gb
      FROM sys.databases d
      INNER JOIN sys.master_files mf ON d.database_id = mf.database_id
      WHERE d.database_id > 4
      GROUP BY d.name
  - metric_name: mssql_server_configuration
    type: gauge
    help: Server-level configuration settings (daily collection)
    value_label: server_config
    key_labels:
      - config_name
    values:
      - config_value
      - is_default
    query: |
      SELECT TOP 100
        name as config_name,
        value as config_value,
        CASE WHEN is_default = 1 THEN 1 ELSE 0 END as is_default
      FROM sys.configurations
      WHERE name NOT LIKE '%trace%'
      ORDER BY name
  - metric_name: mssql_database_configuration
    type: gauge
    help: Database-level configuration settings (daily collection)
    value_label: db_config
    key_labels:
      - database_name
      - config_name
    values:
      - config_value
      - is_default
    query: |
      SELECT TOP 100
        d.name as database_name,
        dc.name as config_name,
        CAST(dc.value AS NVARCHAR(128)) as config_value,
        CASE WHEN dc.is_value_default = 1 THEN 1 ELSE 0 END as is_default
      FROM sys.databases d
      CROSS APPLY sys.dm_database_cached_execution_plans dex
      LEFT JOIN sys.database_options dc ON d.database_id = dc.database_id
      WHERE d.database_id > 4
      AND dc.name IS NOT NULL
  - metric_name: mssql_session_memory_grants
    type: gauge
    help: Query memory grants detail
    value_label: memory_grants
    key_labels:
      - session_id
      - database_name
      - login_name
    values:
      - granted_memory_kb
      - used_memory_kb
      - dop
      - query_duration_sec
    query: |
      SELECT TOP 20
        mg.session_id as session_id,
        ISNULL(DB_NAME(r.database_id), 'Unknown') as database_name,
        ISNULL(s.login_name, 'Unknown') as login_name,
        mg.granted_memory_kb / 1024.0 as granted_memory_kb,
        mg.used_memory_kb / 1024.0 as used_memory_kb,
        mg.dop as dop,
        r.total_elapsed_time / 1000.0 as query_duration_sec
      FROM sys.dm_exec_query_memory_grants mg
      LEFT JOIN sys.dm_exec_requests r ON mg.session_id = r.session_id
      LEFT JOIN sys.dm_exec_sessions s ON mg.session_id = s.session_id
      WHERE mg.granted_memory_kb > 0
      ORDER BY mg.granted_memory_kb DESC
  - metric_name: mssql_scheduler_workload_groups
    type: gauge
    help: CPU scheduler and workload group statistics
    value_label: scheduler_wg
    key_labels:
      - pool_name
      - group_name
    values:
      - active_requests
      - queued_requests
      - cpu_usage_percent
    query: |
      SELECT TOP 20
        p.name as pool_name,
        g.name as group_name,
        g.active_requests as active_requests,
        g.queued_requests as queued_requests,
        g.cpu_usage_percent as cpu_usage_percent
      FROM sys.dm_resource_governor_workload_groups g
      INNER JOIN sys.dm_resource_governor_resource_pools p ON g.pool_id = p.pool_id
      ORDER BY g.active_requests DESC
  - metric_name: mssql_file_io_latency
    type: gauge
    help: File I/O latency statistics
    value_label: file_io_latency
    key_labels:
      - database_name
      - file_name
      - file_type
    values:
      - read_latency_ms
      - write_latency_ms
      - read_bytes_per_sec
      - write_bytes_per_sec
    query: |
      SELECT 
        DB_NAME(mf.database_id) as database_name,
        mf.physical_name as file_name,
        mf.type_desc as file_type,
        ISNULL(vfs.io_stall_read_ms / NULLIF(vfs.num_of_reads, 0), 0) as read_latency_ms,
        ISNULL(vfs.io_stall_write_ms / NULLIF(vfs.num_of_writes, 0), 0) as write_latency_ms,
        ISNULL(vfs.num_of_bytes_read / NULLIF(vfs.num_of_reads, 0), 0) as read_bytes_per_sec,
        ISNULL(vfs.num_of_bytes_written / NULLIF(vfs.num_of_writes, 0), 0) as write_bytes_per_sec
      FROM sys.dm_io_virtual_file_stats(NULL, NULL) vfs
      INNER JOIN sys.master_files mf ON vfs.database_id = mf.database_id AND vfs.file_id = mf.file_id
      WHERE vfs.num_of_reads + vfs.num_of_writes > 0
  - metric_name: mssql_query_store_runtime_stats
    type: gauge
    help: Query Store runtime statistics
    value_label: query_store
    key_labels:
      - database_name
      - query_id
    values:
      - execution_count
      - avg_duration_ms
      - avg_cpu_ms
      - avg_logical_reads
      - total_cpu_ms
    query: |
      SELECT TOP 50
        DB_NAME(d.database_id) as database_name,
        qs.query_id as query_id,
        SUM(qsrs.count_executions) as execution_count,
        AVG(qsrs.avg_duration) as avg_duration_ms,
        AVG(qsrs.avg_cpu_time) as avg_cpu_ms,
        AVG(qsrs.avg_logical_io_reads) as avg_logical_reads,
        SUM(qsrs.avg_cpu_time * qsrs.count_executions) as total_cpu_ms
      FROM sys.query_store_query qs
      INNER JOIN sys.query_store_runtime_stats qsrs ON qs.query_id = qsrs.query_id
      INNER JOIN sys.databases d ON qsrs.database_id = d.database_id
      WHERE qsrs.avg_duration > 0
      GROUP BY d.database_id, qs.query_id
      ORDER BY total_cpu_ms DESC      
