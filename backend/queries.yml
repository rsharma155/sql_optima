  - metric_name: mssql_clr_execution
    type: gauge
    help: CLR execution statistics
    value_label: CLR_exec
    values:
      - clr_execution_count
      - clr_execution_time_ms
    query: |
      SELECT
        ISNULL(COUNT(*), 0) as clr_execution_count,
        ISNULL(SUM(total_worker_time) / 1000, 0) as clr_execution_time_ms
      FROM sys.dm_exec_query_stats
      WHERE query_hash IN (
        SELECT query_hash
        FROM sys.dm_exec_query_stats qs
        CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) st
        WHERE st.text LIKE '%ASSEMBLY%' OR st.text LIKE '%CLR%'
      )
