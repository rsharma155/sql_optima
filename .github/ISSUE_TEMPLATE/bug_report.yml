name: Bug report
description: Report a reproducible defect in SQL Optima
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible so we can reproduce and fix it quickly.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend API
        - Frontend UI
        - Collector / metrics ingestion
        - Setup / first-run wizard
        - Docker / deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start with config …
        2. Navigate to …
        3. See error …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - SQL Optima version / commit:
        - Database engine(s): PostgreSQL x.y / SQL Server x.y
        - Deployment: Docker Compose / bare-metal / Kubernetes
        - OS / architecture:
        - Browser (if UI issue):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text
      placeholder: Paste truncated logs here (remove any credentials before posting).

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have removed any credentials or sensitive data from logs/configs above.
          required: true
