name: CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]

permissions:
  contents: read
  security-events: write

jobs:
  # ── Backend: test, vet, lint, security scan ────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Run tests (with race detector)
        run: go test -v -race -timeout 120s ./...

      - name: Upload coverage
        if: success()
        run: go test -coverprofile=coverage.out -covermode=atomic ./... && go tool cover -func=coverage.out

      # golangci-lint — uses .golangci.yml if present, otherwise defaults
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: backend
          args: --timeout 5m
          only-new-issues: true

      # gosec — SAST for Go source
      - name: gosec security scan
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -no-fail -fmt sarif -out gosec-results.sarif ./...

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('backend/gosec-results.sarif') != ''
        with:
          sarif_file: backend/gosec-results.sarif
          category: gosec

  # ── Dependency vulnerability scan ─────────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (filesystem — Go modules)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ── Docker image build + Trivy container scan ──────────────────────────────
  container-scan:
    name: Container Build & Scan
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sql-optima:ci .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: sql-optima:ci
          format: sarif
          output: trivy-container.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload container scan SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container
