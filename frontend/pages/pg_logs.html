<div class="page-view active dashboard-sky-theme">
  <div class="page-title flex-between dashboard-page-title-compact">
    <div class="dashboard-title-line" style="flex:1; min-width:0;">
      <h1><i class="fa-solid fa-file-lines text-accent"></i> PostgreSQL Log Explorer</h1>
      <span class="subtitle">Recent ERROR/FATAL/PANIC and important warnings (Timescale-backed)</span>
    </div>
    <div class="flex-between dashboard-page-title-actions" style="align-items:center; gap:0.75rem; flex-wrap:wrap; justify-content:flex-end;">
      <button class="btn btn-sm btn-outline" data-action="navigate" data-route="pg-dashboard"><i class="fa-solid fa-arrow-left"></i> Back</button>
      <button class="btn btn-sm btn-outline text-accent" data-action="call" data-fn="PgLogsView"><i class="fa-solid fa-refresh"></i> Refresh</button>
    </div>
  </div>

  <div class="glass-panel p-2 rounded" style="margin-top:0.75rem; display:flex; gap:0.75rem; flex-wrap:wrap; align-items:center;">
    <div class="custom-select-group">
      <label class="text-muted" style="font-size:0.75rem;">Severity</label>
      <select id="pgLogsSeverity" class="custom-select">
        <option value="all">All</option>
        <option value="panic">panic</option>
        <option value="fatal">fatal</option>
        <option value="error" selected>error</option>
        <option value="warning">warning</option>
      </select>
    </div>
    <div class="custom-select-group">
      <label class="text-muted" style="font-size:0.75rem;">Limit</label>
      <select id="pgLogsLimit" class="custom-select">
        <option value="100">100</option>
        <option value="200" selected>200</option>
        <option value="500">500</option>
      </select>
    </div>
    <div class="custom-select-group" style="min-width:260px; flex:1;">
      <label class="text-muted" style="font-size:0.75rem;">Search</label>
      <input id="pgLogsSearch" class="custom-input" placeholder="filter by message / sqlstate / db / user / app" />
    </div>
    <div class="text-muted" style="font-size:0.75rem;" id="pgLogsMeta">Loading…</div>
  </div>

  <div class="table-card glass-panel mt-3" style="padding:0.75rem;">
    <div class="card-header"><h3 style="font-size:0.85rem; margin:0;">Recent log events</h3></div>
    <div class="table-responsive" style="max-height:560px; overflow:auto;">
      <table class="data-table" style="font-size:0.75rem;">
        <thead>
          <tr>
            <th style="min-width:110px;">Time</th>
            <th style="min-width:80px;">Severity</th>
            <th style="min-width:80px;">SQLSTATE</th>
            <th>Message</th>
            <th style="min-width:120px;">DB/User</th>
            <th style="min-width:140px;">App/Client</th>
          </tr>
        </thead>
        <tbody id="pgLogsTbody">
          <tr><td colspan="6" class="text-center text-muted">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
